<!DOCTYPE html>
<html lang="en">

<head>

  <!-- FAVICON -->
<link
  rel="icon"
  href="assets/icons/favicon.png"
>

<!-- PWA MANIFEST -->
<link
  rel="manifest"
  href="manifest.json"
>

<!-- THEME COLOR -->
<meta
  name="theme-color"
  content="#1e88e5"
>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>TravelNest | Destination Explorer</title>

  <meta
    name="description"
    content="Explore destinations around the world using TravelNest."
  >

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animations.css">

</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <nav class="navbar container">

      <h1 class="logo">TravelNest</h1>

      <!-- HAMBURGER -->
      <div class="hamburger" id="hamburger">
        ☰
      </div>

      <!-- NAV LINKS -->
      <ul class="nav-links" id="navLinks">

        <li><a href="index.html">Home</a></li>

        <li><a href="explorer.html">Explorer</a></li>

        <li><a href="budget.html">Budget Planner</a></li>

        <li><a href="generator.html">Trip Generator</a></li>

        <li><a href="mood.html">Travel Mood</a></li>

        <li><a href="feedback.html">Feedback</a></li>

      </ul>

    </nav>

  </header>

  <!-- MAIN -->
  <main class="container">

    <section class="explorer-section">

      <h2 class="section-title">
        Explore Destinations
      </h2>

      <!-- FILTERS -->
      <div class="filters">

        <!-- SEARCH -->
        <input
          type="text"
          id="searchInput"
          placeholder="Search destination..."
        >

        <!-- CONTINENT FILTER -->
        <select id="continentFilter">

          <option value="all">
            All Continents
          </option>

          <option value="Asia">
            Asia
          </option>

          <option value="Europe">
            Europe
          </option>

        </select>

      </div>

      <!-- DESTINATION CARDS -->
      <div
        class="destination-grid"
        id="destinationGrid"
      >

      </div>

    </section>

  </main>

  <!-- MODAL -->
  <div class="modal" id="destinationModal">

    <div class="modal-content">

      <span class="close-btn" id="closeModal">
        &times;
      </span>

      <div id="modalBody">

      </div>

    </div>

  </div>

  <!-- JS -->
  <script src="js/destinations.js"></script>
  <script src="js/explorer.js"></script>

</body>
</html>
