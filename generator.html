<!DOCTYPE html>
<html lang="en">

<head>

  <!-- FAVICON -->
<link
  rel="icon"
  href="assets/icons/favicon.png"
>

<!-- PWA MANIFEST -->
<link
  rel="manifest"
  href="manifest.json"
>

<!-- THEME COLOR -->
<meta
  name="theme-color"
  content="#1e88e5"
>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>TravelNest | Trip Generator</title>

  <meta
    name="description"
    content="Generate random travel destinations using TravelNest."
  >

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animations.css">

</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <nav class="navbar container">

      <h1 class="logo">TravelNest</h1>

      <div class="hamburger" id="hamburger">
        ☰
      </div>

      <ul class="nav-links" id="navLinks">

        <li><a href="index.html">Home</a></li>

        <li><a href="explorer.html">Explorer</a></li>

        <li><a href="budget.html">Budget Planner</a></li>

        <li><a href="generator.html">Trip Generator</a></li>

        <li><a href="mood.html">Travel Mood</a></li>

        <li><a href="feedback.html">Feedback</a></li>

      </ul>

    </nav>

  </header>

  <!-- MAIN -->
  <main class="container">

    <section class="generator-section">

      <h2 class="section-title">
        Random Trip Generator
      </h2>

      <!-- CONTROLS -->
      <div class="generator-controls">

        <!-- TRAVEL TYPE -->
        <select id="travelType">

          <option value="all">
            Select Travel Type
          </option>

          <option value="adventure">
            Adventure
          </option>

          <option value="relaxation">
            Relaxation
          </option>

          <option value="cultural">
            Cultural
          </option>

          <option value="nature">
            Nature
          </option>

        </select>

        <!-- BUDGET -->
        <select id="budgetRange">

          <option value="all">
            Select Budget Range
          </option>

          <option value="low">
            Low
          </option>

          <option value="moderate">
            Moderate
          </option>

          <option value="luxury">
            Luxury
          </option>

        </select>

        <button
          class="btn"
          id="generateBtn"
        >
          Generate Trip
        </button>

      </div>

      <!-- RESULT -->
      <div id="generatorResult">

      </div>

    </section>

  </main>

  <!-- JS -->
  <script src="js/destinations.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/generator.js"></script>

</body>
</html>
