<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>TravelNest | Explore The World</title>

  <meta
    name="description"
    content="TravelNest helps users explore destinations, plan trips, and manage travel inspiration."
  >

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animations.css">

  <!-- FAVICON -->
  <link
    rel="icon"
    href="assets/icons/favicon.png"
  >

  <!-- PWA -->
  <link
    rel="manifest"
    href="manifest.json"
  >
</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <nav class="navbar container">

      <h1 class="logo">TravelNest</h1>

      <!-- HAMBURGER -->
      <div class="hamburger" id="hamburger">
        ☰
      </div>

      <!-- NAV LINKS -->
      <ul class="nav-links" id="navLinks">

        <li><a href="index.html">Home</a></li>

        <li><a href="explorer.html">Explorer</a></li>

        <li><a href="budget.html">Budget Planner</a></li>

        <li><a href="generator.html">Trip Generator</a></li>

        <li><a href="mood.html">Travel Mood</a></li>

        <li><a href="feedback.html">Feedback</a></li>

      </ul>

    </nav>

  </header>

  <!-- MAIN -->
  <main>

    <!-- HERO -->
    <section class="hero container">

      <!-- LEFT -->
      <div class="hero-text">

        <h2>
          Explore Your Dream Destinations
        </h2>

        <p id="quote">
          Adventure awaits around every corner.
        </p>

        <a href="explorer.html" class="btn">
          Explore Now
        </a>

      </div>

      <!-- RIGHT -->
      <div class="hero-image">

        <img
          src="assets/images/hero.jpg"
          alt="Travel destination"
        >

      </div>

    </section>

    <!-- DESTINATION OF THE DAY -->
    <section class="destination-day container">

      <h2 class="section-title">
        Destination of the Day
      </h2>

      <div id="dailyDestination">

      </div>

    </section>

    <!-- NEWSLETTER -->
    <section class="newsletter container">

      <h2 class="section-title">
        Join Our Newsletter
      </h2>

      <form id="newsletterForm">

        <label for="newsletterEmail" class="visually-hidden">
          Email Address
        </label>

          <input
            type="email"
            id="newsletterEmail"
            placeholder="Enter your email"
            required
          >

        <button type="submit" class="btn">
          Subscribe
        </button>

      </form>

      <p id="newsletterMessage"></p>

    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer">

    <div class="container footer-content">

      <p>
        © 2026 TravelNest. All Rights Reserved.
      </p>

      <div class="footer-links">

        <a href="index.html">Home</a>

        <a href="explorer.html">Explorer</a>

        <a href="feedback.html">Support</a>

      </div>

    </div>

  </footer>

  <!-- JS -->
  <script src="js/destinations.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
